spring:
  application:
    name: rect-agent
  ai:
    dashscope:
      enabled: true
      api-key: ${DASHSCOPE_API_KEY:}
  datasource:
    url: jdbc:h2:mem:agentdb;DB_CLOSE_DELAY=-1;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=YES
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tlq.rectagent.data.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rectagent:
  prompts:
    intent-recognition: "你是一位专业的意图识别专家，擅长分析用户的查询意图。请仔细分析用户的输入，识别出用户的具体意图，并返回结构化的意图信息。输出格式：{\"intent\": \"...\", \"entities\": [...], \"confidence\": 0.95}"
    dynamic-prompt: "你是一位专业的提示词工程师，擅长根据上下文生成优化的提示词。请根据用户的意图和上下文信息，生成一个针对性强、效果好的提示词。"
    data-analysis: "你是一位资深的数据安全分析专家，专注于从复杂的数据结构中识别安全风险、异常模式和关键洞察。你的核心能力包括数据解析、风险识别、跨维度关联分析、风险量化评估、数据质量评估和业务影响映射。"
  hook:
    call-limit: 10
    max-tokens-before-summary: 4000
    messages-to-keep: 20
  context:
    l1:
      hot-turns: 5
    l2:
      warm-turns: 10
  token:
    max-input: 8000
    max-output: 4000
    window-keep: 2

  model:
    default-model: dashscope-qwen-turbo
    routing-strategy: cost

    providers:
      dashscope:
        enabled: true
        type: dashscope
        base-url: https://dashscope.aliyuncs.com
        api-key: ${DASHSCOPE_API_KEY:}
        timeout: 30000
        max-retries: 2
      openai:
        enabled: false
        type: openai
        base-url: https://api.openai.com/v1
        api-key: ${OPENAI_API_KEY:}
        timeout: 60000
        max-retries: 3
      anthropic:
        enabled: false
        type: anthropic
        base-url: https://api.anthropic.com
        api-key: ${ANTHROPIC_API_KEY:}
        timeout: 60000
        max-retries: 3

    models:
      dashscope-qwen-turbo:
        provider: dashscope
        model: qwen-turbo
        cost-per-token: 0.001
        priority: 1
        capabilities: intent,prompt,chat
      dashscope-qwen-plus:
        provider: dashscope
        model: qwen-plus
        cost-per-token: 0.01
        priority: 2
        capabilities: analysis,reasoning
      openai-gpt4o-mini:
        provider: openai
        model: gpt-4o-mini
        cost-per-token: 0.002
        priority: 3
        capabilities: analysis,reasoning,chat
      anthropic-haiku:
        provider: anthropic
        model: claude-3-haiku
        cost-per-token: 0.003
        priority: 4
        capabilities: analysis,chat

    agent-model-mapping:
      intent_recognition_agent: dashscope-qwen-turbo
      dynamic_prompt_agent: dashscope-qwen-turbo
      data_analysis_agent: openai-gpt4o-mini

    model-fallback-chains:
      openai-gpt4o-mini: dashscope-qwen-turbo,dashscope-qwen-plus
      anthropic-haiku: openai-gpt4o-mini,dashscope-qwen-turbo

    circuit-breaker:
      enabled: true
      error-rate-threshold: 0.5
      slow-call-duration-ms: 5000
      slow-call-rate-threshold: 0.8
      min-call-count: 10
      wait-duration-in-open-ms: 30000

    traffic-shifting:
      enabled: false
      rules:
        - agent: data_analysis_agent
          model: openai-gpt4o-mini
          percentage: 10
        - agent: data_analysis_agent
          model: dashscope-qwen-turbo
          percentage: 90

server:
  port: 8080
