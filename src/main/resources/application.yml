spring:
  application:
    name: rect-agent
  ai:
    dashscope:
      api-key: sk-48b7560f7c794605bd9f17a69f42bc68
  datasource:
    url: jdbc:h2:mem:agentdb;DB_CLOSE_DELAY=-1;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=YES
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tlq.rectagent.data.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rectagent:
  context:
    l1:
      hot-turns: 5
    l2:
      warm-turns: 10
  token:
    max-input: 8000
    max-output: 4000
    window-keep: 2

server:
  port: 8080
