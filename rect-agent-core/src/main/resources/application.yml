spring:
  application:
    name: rect-agent
  ai:
    dashscope:
      enabled: true5
      api-key: ${DASHSCOPE_API_KEY:}
  datasource:
    url: jdbc:h2:mem:agentdb;DB_CLOSE_DELAY=-1;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=YES
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tlq.rectagent.data.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rectagent:
  prompts:
    intent-recognition: "你是一位专业的意图识别专家，擅长分析用户的查询意图。请仔细分析用户的输入，识别出用户的具体意图，并返回结构化的意图信息。输出格式：{\"intent\": \"...\", \"entities\": [...], \"confidence\": 0.95}"
    dynamic-prompt: "你是一位专业的提示词工程师，擅长根据上下文生成优化的提示词。请根据用户的意图和上下文信息，生成一个针对性强、效果好的提示词。"
    data-analysis: "你是一位资深的数据安全分析专家，专注于从复杂的数据结构中识别安全风险、异常模式和关键洞察。你的核心能力包括数据解析、风险识别、跨维度关联分析、风险量化评估、数据质量评估和业务影响映射。"
  model:
    routingStrategy: cost  # cost | priority
    providers:
      # DashScope：阿里云百炼，多端点容错
      - name: dashscope-primary
        enabled: true
        type: dashscope
        model: qwen-turbo
        apiKey: ${DASHSCOPE_API_KEY:${spring.ai.dashscope.api-key:}}
        costPerToken: 0.001
        priority: 1
        capability: chat
        mock: false
        endpoints:
          - https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
        maxRetries: 2
        retryDelayMs: 500
      # OpenAI：官方 API，支持 endpoint 覆盖
      - name: openai-gpt4
        enabled: false
        type: openai
        model: gpt-4o-mini
        apiKey: ${OPENAI_API_KEY:}
        costPerToken: 0.002
        priority: 2
        capability: chat
        mock: true
        endpoint: https://api.openai.com/v1/chat/completions
        maxRetries: 2
        retryDelayMs: 500
      # Anthropic：Claude 系列
      - name: anthropic-claude
        enabled: false
        type: anthropic
        model: claude-3-haiku
        apiKey: ${ANTHROPIC_API_KEY:}
        costPerToken: 0.003
        priority: 3
        capability: chat
        mock: true
        maxRetries: 2
        retryDelayMs: 500
  context:
    l1:
      hot-turns: 5
    l2:
      warm-turns: 10
  token:
    max-input: 8000
    max-output: 4000
    window-keep: 2

server:
  port: 8080
